#
# HBase connector default runtime configuration
# This file is read by Water ApplicationProperties in OSGi runtime.
#
# Environment variables (production):
# - WATER_HBASE_MASTER_HOSTNAME: HBase master hostname (default: localhost)
# - WATER_HBASE_MASTER_PORT: HBase master port (default: 16000)
# - WATER_HBASE_ZOOKEEPER_QUORUM: ZooKeeper quorum addresses (default: localhost:2181)
# - WATER_HBASE_ROOT_DIR: HBase root directory in HDFS (default: /hbase)
# - WATER_HBASE_CLUSTER_DISTRIBUTED: Cluster distributed mode (default: false)
# - WATER_HBASE_CONNECTOR_MAX_THREADS: Max async threads (default: 10)
# - WATER_HBASE_CONNECTOR_MAX_QUEUE_THREADS: Max queue threads (default: 20)
# - WATER_HBASE_CONNECTION_TIMEOUT: Connection timeout in ms (default: 30000)
# - WATER_HBASE_REQUEST_TIMEOUT: Request timeout in ms (default: 600000)
#

# HBase Master Configuration
# Environment variable: WATER_HBASE_MASTER_HOSTNAME
# Default: localhost
it.water.connectors.hbase.master.hostname=${env:WATER_HBASE_MASTER_HOSTNAME:-localhost}

# HBase Master Port
# Environment variable: WATER_HBASE_MASTER_PORT
# Default: 16000 (standard HBase master port)
it.water.connectors.hbase.master.port=${env:WATER_HBASE_MASTER_PORT:-16000}

# ZooKeeper Quorum (comma-separated for clusters)
# Environment variable: WATER_HBASE_ZOOKEEPER_QUORUM
# Default: localhost:2181 (standard ZooKeeper port)
it.water.connectors.hbase.zookeeper.quorum=${env:WATER_HBASE_ZOOKEEPER_QUORUM:-localhost:2181}

# HBase Root Directory in HDFS
# Environment variable: WATER_HBASE_ROOT_DIR
# Default: /hbase
it.water.connectors.hbase.root.dir=${env:WATER_HBASE_ROOT_DIR:-/hbase}

# Is Cluster Distributed (true for multi-node, false for standalone)
# Environment variable: WATER_HBASE_CLUSTER_DISTRIBUTED
# Default: false (standalone mode)
it.water.connectors.hbase.cluster.distributed=${env:WATER_HBASE_CLUSTER_DISTRIBUTED:-false}

# HBase Connector Thread Pool Settings
# Maximum number of threads for async HBase operations
# Environment variable: WATER_HBASE_CONNECTOR_MAX_THREADS
# Default: 10
it.water.connectors.hbase.connector.max.threads=${env:WATER_HBASE_CONNECTOR_MAX_THREADS:-10}

# Maximum queue threads for blocking operations
# Environment variable: WATER_HBASE_CONNECTOR_MAX_QUEUE_THREADS
# Default: 20
it.water.connectors.hbase.connector.max.queue.threads=${env:WATER_HBASE_CONNECTOR_MAX_QUEUE_THREADS:-20}

# Connection Timeout (milliseconds)
# Environment variable: WATER_HBASE_CONNECTION_TIMEOUT
# Default: 30000 (30 seconds)
it.water.connectors.hbase.connection.timeout=${env:WATER_HBASE_CONNECTION_TIMEOUT:-30000}

# Request Timeout (milliseconds)
# Environment variable: WATER_HBASE_REQUEST_TIMEOUT
# Default: 600000 (10 minutes)
it.water.connectors.hbase.request.timeout=${env:WATER_HBASE_REQUEST_TIMEOUT:-600000}

# Backward-compatible keys (HyperIoT legacy)
# These keys are supported for backward compatibility but should not be used for new deployments
it.acsoftware.hyperiot.hbase.master.hostname=${env:WATER_HBASE_MASTER_HOSTNAME:-localhost}
it.acsoftware.hyperiot.hbase.master.port=${env:WATER_HBASE_MASTER_PORT:-16000}
it.acsoftware.hyperiot.hbase.zookeeper.quorum=${env:WATER_HBASE_ZOOKEEPER_QUORUM:-localhost:2181}
it.acsoftware.hyperiot.hbase.rootdir=${env:WATER_HBASE_ROOT_DIR:-/hbase}
it.acsoftware.hyperiot.hbase.cluster.distributed=${env:WATER_HBASE_CLUSTER_DISTRIBUTED:-false}
it.acsoftware.hyperiot.hbase.connector.maxThreads=${env:WATER_HBASE_CONNECTOR_MAX_THREADS:-10}
it.acsoftware.hyperiot.hbase.connector.max.queue.threads=${env:WATER_HBASE_CONNECTOR_MAX_QUEUE_THREADS:-20}
